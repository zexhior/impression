name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main # Déclenche le workflow lors d'un push sur la branche main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code source du dépôt
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configure Docker Buildx (permet des builds plus rapides et avancés)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Connexion à Docker Hub en utilisant les secrets configurés
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build de l'image et Push automatique sur Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Remplacez "mon-application" par le nom de votre repository Docker Hub
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mon-application:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mon-application:${{ github.sha }}
